name: CI
on:
  push:
  pull_request:
jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile api/server.py scripts/build_unified_database.py scripts/database_sync_bot.py
